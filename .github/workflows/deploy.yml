name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build, test, and verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build site (Astro + Pagefind index)
        run: npm run build

      # Astro writes files to dist/, but GitHub Pages serves them under the
      # /maester-website base path. Stage a directory whose layout mirrors the
      # live URL structure so lychee can resolve root-relative links locally.
      - name: Stage dist for link checking
        run: |
          mkdir -p _lychee
          ln -s ../dist _lychee/maester-website

      # Install and run lychee directly rather than via lycheeverse/lychee-action.
      # The released v2.x of that action can't open the v0.24.x tarball (the
      # binary moved into a subfolder); the fix exists on master but isn't
      # tagged yet. Owning these ~10 lines avoids further wrapper churn and
      # keeps the lychee version aligned with our config schema (notably
      # `include_fragments = "full"`, which is v0.24+).
      - name: Verify asset & link integrity (lychee)
        env:
          LYCHEE_VERSION: v0.24.2
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}"
          curl -sfL -o lychee.tar.gz \
            "https://github.com/lycheeverse/lychee/releases/download/lychee-${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf lychee.tar.gz
          "${RUNNER_TEMP}/lychee-x86_64-unknown-linux-gnu/lychee" \
            --config "${GITHUB_WORKSPACE}/lychee.toml" \
            --root-dir "${GITHUB_WORKSPACE}/_lychee" \
            --remap "https://baller-software.github.io file://${GITHUB_WORKSPACE}/_lychee" \
            "${GITHUB_WORKSPACE}/_lychee/maester-website"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
