name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build, test, and verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build site (Astro + Pagefind index)
        run: npm run build

      # Astro writes files to dist/, but GitHub Pages serves them under the
      # /maester-website base path. Stage a directory whose layout mirrors the
      # live URL structure so lychee can resolve root-relative links locally.
      - name: Stage dist for link checking
        run: |
          mkdir -p _lychee
          ln -s ../dist _lychee/maester-website

      - name: Verify asset & link integrity (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --root-dir ${{ github.workspace }}/_lychee
            --remap "https://baller-software.github.io file://${{ github.workspace }}/_lychee"
            _lychee/maester-website
          fail: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
