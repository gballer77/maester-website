# Asset & link integrity check configuration.
# Per gspec/stack.md §5 and gspec/practices.md §2:
#   - internal failures block deploy (treated as errors)
#   - external failures warn but do not block
#
# Run against the built output: `lychee --config lychee.toml dist`

# Accept successful responses
accept = ["200", "203", "206", "301", "302", "307", "308"]

# Cache external responses to avoid hammering remote hosts on repeated runs
cache = true
max_cache_age = "1d"

# Reasonable network behavior
max_concurrency = 8
timeout = 20
retry_wait_time = 2
max_retries = 2

# Resolve directory-style links (e.g. /maester-website/about/) to index files.
index_files = ["index.html"]

# The path-specific options (`--root-dir` for resolving root-relative links
# and `--remap` for translating the deployed origin to the local staging
# tree) live in the CI workflow because they need an absolute path. See
# .github/workflows/deploy.yml.

exclude_path = []

# Failures on these URLs don't block the deploy. The maester CLI project and
# its npm package are not yet publicly published, so their canonical pages
# 404/403 — we still want to keep the links in content so they go live when
# the project does.
exclude = [
  # Social/share previews — sometimes flaky and not load-bearing
  "^https://twitter\\.com",
  "^https://x\\.com",
  # The maester CLI project & package — not yet publicly published
  "^https://github\\.com/baller-software/maester(/|$)",
  "^https://www\\.npmjs\\.com/package/@baller\\.software/maester",
]

# Treat external-only failures as warnings rather than errors
# (lychee CLI: pass `--accept-empty-fragments` etc. via workflow if needed)
no_progress = false
require_https = false
include_fragments = "full"
